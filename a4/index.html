<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <link rel="stylesheet" media="screen" ref="https://fontlibrary.org//face/glacial-indifference" type="text/css"/>
  <title>JS Bin</title>
</head>
  <body>
  
	<title>Liquid Layout</title>
	<style type="text/css">
			* {
				font-family: Arial, Verdana, sans-serif;
				color: white;
				text-align: center;}
            h1{
              color: #0d5c4f;  
              font-family: 'GlacialIndifferenceRegular';
                font-weight: normal;
                font-style: normal}
			
            body {
				width: 90%;
				margin: 0 auto;
                background-image: url("https://cdn.pixabay.com/photo/2020/03/17/14/59/illustration-4940622_1280.jpg");
                background-repeat: no-repeat;
                background-attachment: fixed}
			
            #content {
				overflow: auto;}
			
            #feature {
				margin: 1%;
                background-color: #b0b898}
            
          #feature {
                background-color: #b0b898;
                background-image: url("https://cdn.pixabay.com/photo/2024/03/13/00/24/bird-8629779_1280.png");
                background-size:contain;
                background-position: right;
                background-repeat:no-repeat;}
      
			.column1, .column2, .column3 {
				width: 31.3%;
				float: left;
				margin: 1%;}
      
            .column1 {
				margin-right: 0;
                background-color: #778a51}      
      
            .column2 {
				margin-right: 0;
                background-color: #5e7039}
      
			.column3 {
				margin-right: 0;
                background-color: #3d4a23}
			li {
				display: inline;
				padding: 0.5em;}
      
            #nav {
                background-color: #703904;
				padding: 0.5em 0;
                margin: 1%;}
      
            #footer {
				background-color: #0d5c4f;
				padding: 0.5em 0;
                margin: 1%}
      
			#feature, .article {
				height: 10em;
              margin-bottom: 1em;}
            
		</style>
	</head>
	<body>
		<div id="header">
			<h1>Logo</h1>
			<div id="nav">
				<ul>
					<li><a href="">Home</a></li>
					<li><a href="">Products</a></li>
					<li><a href="">Services</a></li>
					<li><a href="">About</a></li>
					<li><a href="">Contact</a></li>
				</ul>
			</div>
		</div>
		<div id="content">
			<div id="feature">
				<p>Feature</p>
			</div>
			<div class="article column1">
				<p>Column One</p>
			</div>
			<div class="article column2">
				<p>Column Two</p>
			</div>
			<div class="article column3">
				<p>Column Three</p>
			</div>
		</div>
		<div id="footer">
			<p>&copy; Copyright 2011</p>
		</div>
</body>
</html>
